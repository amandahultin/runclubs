<!--
  Internal include-only partial — not a component itself, not synced to
  Claude Design as its own card. Every component and template includes
  this for fonts, color/spacing tokens, and a base reset, so there is
  exactly one place these values are defined.

  Edit colors/fonts here and every component + template picks it up.
-->
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,wght@1,900&family=Oswald:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg:          #FDFAF9;
    --color-navy:        #1C2A45;
    --color-coral:       #D4715E;
    --color-coral-light: #EEAA96;
    --color-card-border: #E8D8D3;
    --color-pill-border: #D4C4BF;
    --color-muted:       #888;
    --color-tertiary:    #aaa;
    --color-blob:        #F7E3DD;

    --city-stockholm-bg: #C6EFCE;
    --city-stockholm-fg: #276221;
    --city-goteborg-bg:  #FFF3C4;
    --city-goteborg-fg:  #7A5C00;
    --city-malmo-bg:     #F7E8E4;
    --city-malmo-fg:     #c25a47;

    --font-display: 'Archivo Black', sans-serif;
    --font-heading: 'Oswald', sans-serif;
    --font-body:    'DM Sans', sans-serif;
    --font-wordmark-run:   'Inter', sans-serif;
    --font-wordmark-clubs: 'Playfair Display', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--color-navy); background: var(--color-bg); }
</style>

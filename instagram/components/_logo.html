<!--
  Style + macro partial for the logo component. Not a Claude Design card
  itself — see logo.html for the browsable demo. Templates pull this in
  with both an include (for the CSS) and a from-import (for the macro),
  since Jinja's import only binds the macro name, not any plain
  markup/CSS that lives alongside it in the file.
-->
<style>
  .logo { display: inline-flex; align-items: baseline; color: #1a1a1a; text-decoration: none; font-size: 34px; }
  .logo .run { font-family: var(--font-wordmark-run); font-weight: 900; font-style: italic; letter-spacing: -0.04em; padding-right: 2px; }
  .logo .clubs { font-family: var(--font-wordmark-clubs); font-weight: 400; letter-spacing: -0.02em; }
  .logo .suffix { font-family: var(--font-wordmark-clubs); font-size: 0.45em; font-weight: 400; text-transform: lowercase; margin-left: 2px; }
  .logo.small { font-size: 24px; }
</style>
{% macro logo(size='big') %}
<span class="logo{{ ' small' if size == 'small' else '' }}"><span class="run">RUN</span><span class="clubs">CLUBS</span><span class="suffix">.se</span></span>
{% endmacro %}

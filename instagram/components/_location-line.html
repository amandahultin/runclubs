<!-- Style + macro partial for the location line — see location-line.html for the demo. -->
<style>
  .loc { display: flex; align-items: center; gap: 12px; color: var(--color-muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .loc svg { flex-shrink: 0; }
</style>
{% macro location_line(text, scale=1.0) %}
{% set px = (22*scale)|round|int %}
<div class="loc" style="font-size:{{ (26*scale)|round|int }}px">
  <svg width="{{ px }}" height="{{ px }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  <span>{{ text }}</span>
</div>
{% endmacro %}

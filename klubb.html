  <title>Run Club — Swedish Run Clubs</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; color: #1C2A45; background: #FDFAF9; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #F0E0DC; background: #FDFAF9; }
    .run-clubs-logo { display: inline-flex; align-items: baseline; font-size: 36px; color: #1a1a1a; text-decoration: none; }
    .run-clubs-logo .run { font-family: 'Inter', sans-serif; font-weight: 900; font-style: italic; letter-spacing: -0.04em; padding-right: 2px; }
    .run-clubs-logo .clubs { font-family: 'Playfair Display', serif; font-weight: 400; letter-spacing: -0.02em; }
    .run-clubs-logo .suffix { font-family: 'Playfair Display', serif; font-size: 0.45em; font-weight: 400; text-transform: lowercase; margin-left: 2px; }
    .nav-links { display: flex; gap: 1.5rem; font-size: 13px; }
    .nav-links a { text-decoration: none; color: #888; }
    .nav-links a:hover { color: #1C2A45; }
    .hero { background: #1C2A45; padding: 3rem 1.5rem 2.5rem; }
    .breadcrumb { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 0.75rem; }
    .breadcrumb a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .breadcrumb a:hover { color: #EEAA96; }
    .hero-tag { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #EEAA96; margin-bottom: 0.75rem; }
    .hero h1 { font-family: 'Archivo Black', sans-serif; font-size: 42px; line-height: 1.05; text-transform: uppercase; color: #FDFAF9; letter-spacing: 2px; margin-bottom: 0.75rem; }
    .coming-soon { padding: 3rem 1.5rem; max-width: 600px; }
    .coming-soon-box { background: #F7E8E4; border: 1px solid #F0D8D3; border-radius: 16px; padding: 2.5rem; text-align: center; margin-bottom: 1.5rem; }
    .coming-soon-icon { font-size: 36px; margin-bottom: 1rem; }
    .coming-soon-box h2 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px; text-transform: uppercase; color: #1C2A45; margin-bottom: 0.75rem; }
    .coming-soon-box p { font-size: 15px; line-height: 1.8; color: #666; }
    .contact-box { background: #1C2A45; border-radius: 16px; padding: 2rem; text-align: center; }
    .contact-box h3 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 18px; text-transform: uppercase; color: #FDFAF9; margin-bottom: 0.75rem; }
    .contact-box p { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.6); margin-bottom: 1.5rem; }
    .contact-btn { display: inline-block; background: #D4715E; color: #FDFAF9; font-size: 13px; font-weight: 500; padding: 12px 28px; border-radius: 4px; text-decoration: none; }
    .contact-btn:hover { background: #C8604A; }
    .back { font-size: 13px; color: #D4715E; text-decoration: none; padding: 1.5rem; display: block; }
    .back:hover { color: #C8604A; }
        /* ── NEWSLETTER ─────────────────────── */
    .nl-section { background: #ffffff; border-top: 1px solid #E8E8E8; border-bottom: 1px solid #E8E8E8; }
    .nl-body { max-width: 560px; margin: 0 auto; padding: 4rem 2rem; text-align: center; }
    .nl-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #FFF0ED; color: #D4715E;
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 100px; margin-bottom: 1.5rem;
    }
    .nl-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(28px, 4vw, 42px);
      color: #1C2A45; line-height: 1.1; text-transform: uppercase;
      letter-spacing: -1px; margin-bottom: 1rem;
    }
    .nl-title em { color: #D4715E; font-style: normal; }
    .nl-desc { font-size: 15px; color: #777; line-height: 1.75; margin-bottom: 2rem; }
    .newsletter-form { display: flex; flex-direction: column; gap: 12px; }
    .newsletter-input {
      padding: 16px 20px; border: 2px solid #E8E8E8; border-radius: 12px;
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      color: #1C2A45; background: #fff; outline: none;
      transition: border-color 0.2s; width: 100%; box-sizing: border-box;
    }
    .newsletter-input::placeholder { color: #aaa; }
    .newsletter-input:focus { border-color: #D4715E; }
    .newsletter-btn {
      background: #D4715E; color: #fff;
      font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
      padding: 17px; border-radius: 12px; border: none;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .newsletter-btn:hover { background: #C8604A; }
    .nl-disclaimer { font-size: 11px; color: #bbb; text-align: center; margin-top: 0.75rem; }

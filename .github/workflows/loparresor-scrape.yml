name: Scrape löparresor → Sheet

# Scrapes source sites and upserts rows into the "Loparresor" tab of the
# Google Sheet.  Does NOT touch loparresor.html.
#
# After this runs, review the Sheet, set publish=N on any rows you want to
# hide, then trigger "Generate löparresor page" manually.

on:
  schedule:
    - cron: "0 7 * * 0"    # Every Sunday at 07:00 UTC
  workflow_dispatch:         # Manual run from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-loparresor.txt

      - name: Install dependencies
        run: pip install -r requirements-loparresor.txt

      - name: Scrape sites → Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LOPARRESOR_SHEET_ID: ${{ secrets.LOPARRESOR_SHEET_ID }}
        run: python scrape_loparresor.py

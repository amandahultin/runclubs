name: Generate Instagram event images (Stockholm)

on:
  # No schedule yet — manual runs only while we iterate on the template.
  # Add back once we're happy with the output:
  #   schedule:
  #     - cron: "0 6 * * 0"   # Every Sunday 06:00 UTC (~08:00 Swedish summer time)
  workflow_dispatch:
    inputs:
      week_start:
        description: "Override target week's Monday (YYYY-MM-DD). Leave blank for next Mon-Sun."
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-instagram.txt

      - name: Install Python dependencies
        run: pip install -r requirements-instagram.txt

      - name: Install Chromium (+ system deps + color emoji font)
        run: |
          python -m playwright install --with-deps chromium
          sudo apt-get install -y fonts-noto-color-emoji

      - name: Generate and upload Instagram images
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EVENTS_SHEET_ID: ${{ secrets.EVENTS_SHEET_ID }}
          INSTAGRAM_DRIVE_FOLDER_ID: ${{ secrets.INSTAGRAM_DRIVE_FOLDER_ID }}
        run: |
          python generate_instagram_event_images.py \
            --out-dir instagram/generated \
            --week-start "${{ github.event.inputs.week_start }}" \
            --upload

      - name: Upload generated images as a workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-event-images
          path: instagram/generated/*.png
          if-no-files-found: ignore
          retention-days: 7

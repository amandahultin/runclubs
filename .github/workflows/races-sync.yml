name: Sync kommande lopp

on:
  schedule:
    - cron: "30 8 * * 1"   # Every Monday at 08:30 UTC (after mikaelsto/runclubs-races-scraper at 05:00)
  workflow_dispatch:         # Allow manual runs from GitHub UI

permissions:
  contents: write            # Needed to commit the generated HTML

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-races.txt

      - name: Install dependencies
        run: pip install -r requirements-races.txt

      - name: Generate loppkalender.html
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.RACES_SHEET_ID }}
        run: python generate_kommande_lopp.py loppkalender.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loppkalender.html
          git diff --staged --quiet || git commit -m "Auto-update loppkalender.html [skip ci]"
          git push

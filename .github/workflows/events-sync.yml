name: Sync Stockholm running events

on:
  schedule:
    - cron: "0 5 * * *"   # Every day 05:00 UTC — after mikaelsto/runclubs-events-feed syncs at 04:00
  workflow_dispatch:        # Allow manual runs from the GitHub Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-events.txt

      - name: Install dependencies
        run: pip install -r requirements-events.txt

      - name: Generate stockholm-running-events.html
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.EVENTS_SHEET_ID }}
        run: python generate_stockholm_events.py stockholm-running-events.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stockholm-running-events.html
          git diff --staged --quiet || git commit -m "Auto-update stockholm-running-events.html [skip ci]"
          git push

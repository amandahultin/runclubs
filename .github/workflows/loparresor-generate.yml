name: Generate löparresor page

# Reads the "Loparresor" tab in the Google Sheet and regenerates loparresor.html.
# Run this manually after you have reviewed and filtered the Sheet.
#
# Rows with publish=N are excluded from the page.
# Rows with publish=Y or publish empty are included.

on:
  workflow_dispatch:         # Manual run only — you decide when the page updates

permissions:
  contents: write            # Needed to commit loparresor.html

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-loparresor.txt

      - name: Install dependencies
        run: pip install -r requirements-loparresor.txt

      - name: Generate loparresor.html from Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LOPARRESOR_SHEET_ID: ${{ secrets.LOPARRESOR_SHEET_ID }}
        run: python generate_loparresor.py loparresor.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loparresor.html
          git diff --staged --quiet || git commit -m "Auto-update loparresor.html [skip ci]"
          git push

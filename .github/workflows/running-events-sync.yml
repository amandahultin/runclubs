name: Sync running events (alla städer)

on:
  schedule:
    - cron: "45 5 * * *"   # Every day 05:45 UTC — after city-specific syncs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-events.txt

      - name: Install dependencies
        run: pip install -r requirements-events.txt

      - name: Generate running-events.html
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.EVENTS_SHEET_ID }}
        run: python generate_running_events.py running-events.html

      - name: Patch index.html with today's events (SSR for Googlebot)
        run: python generate_homepage_events.py

      - name: Refresh SportsEvent JSON-LD in running-events.html
        run: python inject_rich_schemas.py

      - name: Re-apply CWV optimisations to generated files
        run: python3 cwv_optimise.py running-events.html index.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add running-events.html index.html
          git diff --staged --quiet || git commit -m "Auto-update events + homepage SSR + SportsEvent schema [skip ci]"
          git pull --rebase --autostash origin main
          git push

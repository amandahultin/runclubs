name: Daily freshness stamp

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stamp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stamp today's date on all club and city pages
        run: python3 inject_freshness.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stockholm/ goteborg/ ovriga-landet/ stockholm.html goteborg.html ovriga-landet.html
          if git diff --staged --quiet; then
            echo "Nothing to commit — dates already up to date."
          else
            git commit -m "chore: freshness stamp $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi
